<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunny Sphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #E8A020;
      --black: #1a1a1a;
      --muted: #888580;
      --font: 'Poppins', 'Inter', -apple-system, sans-serif;
    }
    html, body { font-family: var(--font); background: #f9f8f6; color: #1a1a1a; -webkit-font-smoothing: antialiased; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(232,160,32,0.2); border-top-color: #E8A020; border-radius: 50%; animation: spin 0.75s linear infinite; }

    .btn-gold { background: #E8A020; color: #1a1a1a; font-weight: 700; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-family: var(--font); font-size: 14px; transition: opacity 0.15s; white-space: nowrap; }
    .btn-gold:hover { opacity: 0.88; }
    .btn-gold:disabled { opacity: 0.6; cursor: not-allowed; }

    .nav-tab { padding: 8px 18px; border-radius: 100px; font-weight: 500; font-size: 13px; cursor: pointer; transition: all 0.15s; border: 1px solid rgba(0,0,0,0.12); background: transparent; color: #888580; font-family: var(--font); white-space: nowrap; }
    .nav-tab:hover { border-color: rgba(232,160,32,0.4); color: #1a1a1a; }
    .nav-tab.active { background: #E8A020; color: #1a1a1a; font-weight: 700; border-color: #E8A020; }

    .filter-pill { padding: 5px 14px; border-radius: 100px; font-size: 13px; cursor: pointer; transition: all 0.15s; border: 1px solid rgba(0,0,0,0.12); background: transparent; color: #888580; font-family: var(--font); white-space: nowrap; }
    .filter-pill:hover { border-color: rgba(232,160,32,0.4); color: #1a1a1a; }
    .filter-pill.active { background: #E8A020; color: #1a1a1a; font-weight: 700; border-color: #E8A020; }

    .popular-pill { padding: 5px 14px; border-radius: 100px; border: 1px solid rgba(0,0,0,0.12); background: transparent; color: #888580; font-size: 12px; cursor: pointer; font-family: var(--font); transition: all 0.15s; }
    .popular-pill:hover { border-color: rgba(232,160,32,0.4); color: #1a1a1a; }

    .form-input { width: 100%; padding: 11px 16px; border: 1px solid rgba(0,0,0,0.12); border-radius: 10px; font-family: var(--font); font-size: 14px; color: #1a1a1a; background: #fff; outline: none; transition: border-color 0.15s; }
    .form-input:focus { border-color: #E8A020; }
    .form-input::placeholder { color: #bbb; }

    .form-textarea { width: 100%; padding: 11px 16px; border: 1px solid rgba(0,0,0,0.12); border-radius: 10px; font-family: var(--font); font-size: 14px; color: #1a1a1a; background: #fff; outline: none; transition: border-color 0.15s; resize: vertical; min-height: 100px; line-height: 1.6; }
    .form-textarea:focus { border-color: #E8A020; }
    .form-textarea::placeholder { color: #bbb; }

    .tool-card { background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 14px; padding: 18px; cursor: pointer; transition: border-color 0.15s, transform 0.15s; text-decoration: none; display: block; color: inherit; }
    .tool-card:hover { border-color: rgba(232,160,32,0.5); transform: scale(1.01); }

    .skill-card { background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 14px; padding: 18px; display: flex; flex-direction: column; transition: border-color 0.15s; }
    .skill-card:hover { border-color: rgba(232,160,32,0.5); }

    .loom-card { background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 14px; padding: 18px; display: block; text-decoration: none; color: inherit; transition: border-color 0.15s; }
    .loom-card:hover { border-color: rgba(232,160,32,0.4); }

    .tools-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .skills-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .looms-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    @media (max-width: 1100px) { .skills-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 900px) { .tools-grid { grid-template-columns: repeat(2, 1fr); } .skills-grid { grid-template-columns: repeat(2, 1fr); } .looms-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .tools-grid, .skills-grid, .looms-grid { grid-template-columns: 1fr; } }

    .tip-item { display: flex; gap: 14px; padding: 18px 0; border-bottom: 1px solid rgba(0,0,0,0.06); align-items: flex-start; }
    .tip-item:last-child { border-bottom: none; }

    .upvote-btn { background: none; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; color: #888580; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 10px; border-radius: 8px; transition: all 0.15s; font-family: var(--font); flex-shrink: 0; min-width: 44px; }
    .upvote-btn:hover:not(:disabled) { background: rgba(232,160,32,0.08); border-color: rgba(232,160,32,0.4); }
    .upvote-btn.liked { color: #E8A020; border-color: rgba(232,160,32,0.4); background: rgba(232,160,32,0.06); }
    .upvote-btn:disabled { cursor: default; }

    .bookmark-btn { background: none; border: none; cursor: pointer; color: #ccc; font-size: 16px; padding: 4px; transition: color 0.15s; flex-shrink: 0; }
    .bookmark-btn:hover { color: #E8A020; }

    .read-more-btn { background: none; border: none; color: #E8A020; font-weight: 600; cursor: pointer; font-family: var(--font); font-size: 13px; padding: 0; }
    .collapse-btn { background: none; border: none; cursor: pointer; font-family: var(--font); font-size: 15px; font-weight: 700; color: #1a1a1a; display: flex; align-items: center; gap: 8px; padding: 0; }
    .collapse-btn:hover { color: #E8A020; }

    .search-bar-container { display: flex; gap: 8px; align-items: stretch; }
    @media (max-width: 480px) { .search-bar-container { flex-direction: column; } }
    @media (max-width: 640px) { .submit-btn { width: 100%; } }
    @media (max-width: 820px) { .nav-tabs-center { order: 3; width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; } }

    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* ── Constants ── */
const ACCESS_PASSWORD = 'Sunny2026';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwYVGqqmFQTl77fK5K6-b4OiGIaqaiHtDXO1AUs89tTJF6uuB2sQ7aGbFRsND0RUaSM4g/exec';
const TOOL_CATEGORIES = ['All', 'Content', 'Paid Ads', 'Strategy', 'Analytics', 'Productivity', 'Design'];
const POPULAR_SEARCHES = ['ChatGPT', 'Image generation', 'Copywriting', 'Scheduling', 'Analytics'];

/* ── Helpers ── */
function parseRows(data) {
  if (!data || data.length < 2) return [];
  const headers = data[0].map(h => h.toLowerCase().trim().replace(/\s+/g, '_'));
  return data.slice(1)
    .filter(row => row[0] && row[0].trim() !== '')
    .map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = row[i] ?? ''; });
      return obj;
    });
}
function pick(row, ...keys) {
  for (const k of keys) { if (row[k] !== undefined && row[k] !== '') return row[k]; }
  return '';
}
function checkAuth() {
  try {
    const s = sessionStorage.getItem('sunnyAuth');
    if (!s) return false;
    const { timestamp } = JSON.parse(s);
    if (Date.now() - timestamp > 8 * 60 * 60 * 1000) { sessionStorage.removeItem('sunnyAuth'); return false; }
    return true;
  } catch { return false; }
}
function getFileType(link) {
  if (!link) return { type: 'FILE', bg: '#888580' };
  const l = link.toLowerCase();
  if (l.includes('.pdf')) return { type: 'PDF', bg: '#e53e3e' };
  if (l.includes('.docx') || l.includes('.doc')) return { type: 'DOC', bg: '#3182ce' };
  if (l.includes('.xlsx') || l.includes('.xls')) return { type: 'XLS', bg: '#38a169' };
  if (l.includes('.md')) return { type: 'MD', bg: '#805ad5' };
  return { type: 'FILE', bg: '#888580' };
}
function readLiked() {
  try { const s = sessionStorage.getItem('sunnyLiked'); return s ? new Set(JSON.parse(s)) : new Set(); }
  catch { return new Set(); }
}

/* ── Spinner ── */
function Spinner() {
  return (
    <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', padding: '80px 0' }}>
      <div className="spinner" />
    </div>
  );
}

/* ── Logo mark (reused in nav + gate) ── */
function Logo({ size = 'md' }) {
  const big = size === 'lg';
  return (
    <div style={{ textAlign: big ? 'center' : 'left' }}>
      <div style={{ fontSize: big ? 36 : 15, fontWeight: 800, color: '#1a1a1a', display: 'flex', alignItems: 'center', gap: 6, justifyContent: big ? 'center' : 'flex-start', letterSpacing: '-0.01em' }}>
        ☀️ Sunny Sphere
      </div>
      <div style={{ fontSize: big ? 12 : 11, color: '#888580', fontWeight: 400, marginTop: big ? 2 : 1 }}>Sunny Sphere</div>
    </div>
  );
}

/* ── Password Gate ── */
function PasswordGate({ onAuthenticated }) {
  const [password, setPassword] = useState('');
  const [error, setError] = useState(false);
  const submit = () => {
    if (password === ACCESS_PASSWORD) {
      sessionStorage.setItem('sunnyAuth', JSON.stringify({ timestamp: Date.now() }));
      onAuthenticated();
    } else { setError(true); setPassword(''); }
  };
  return (
    <div style={{ position: 'fixed', inset: 0, background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: "'Poppins', sans-serif", padding: 16 }}>
      <div style={{ background: '#fff', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 20, padding: '48px 40px', width: '100%', maxWidth: 420, textAlign: 'center', boxShadow: '0 4px 32px rgba(0,0,0,0.06)' }}>
        <Logo size="lg" />
        <div style={{ fontSize: 13, color: '#888580', marginTop: 6, marginBottom: 32, paddingBottom: 28, borderBottom: '1px solid rgba(0,0,0,0.06)' }}>Internal use only</div>
        <p style={{ fontSize: 14, color: '#1a1a1a', marginBottom: 16, fontWeight: 500 }}>Enter password to access Sunny Sphere</p>
        <input
          type="password" value={password} autoFocus
          onChange={e => { setPassword(e.target.value); setError(false); }}
          onKeyDown={e => e.key === 'Enter' && submit()}
          placeholder="Password" className="form-input"
          style={{ marginBottom: error ? 10 : 16, textAlign: 'center', letterSpacing: '0.1em' }}
        />
        {error && <p style={{ color: '#e53e3e', fontSize: 13, marginBottom: 14, fontWeight: 500 }}>Incorrect password</p>}
        <button className="btn-gold" onClick={submit} style={{ width: '100%', padding: '13px 20px', fontSize: 15, borderRadius: 10 }}>Enter</button>
      </div>
    </div>
  );
}

/* ── Nav Bar ── */
function NavBar({ activeTab, onTabChange }) {
  const tabs = [
    { id: 'tools', label: '🛠 Tools' },
    { id: 'skills', label: '✨ Claude Skill Library' },
    { id: 'aiid', label: "💡 Could This Be AI'd?" },
  ];
  return (
    <nav style={{ position: 'sticky', top: 0, zIndex: 100, background: '#fff', borderBottom: '1px solid rgba(0,0,0,0.08)' }}>
      <div style={{ maxWidth: 1280, margin: '0 auto', padding: '12px 24px', display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap' }}>
        <Logo />
        <div className="nav-tabs-center" style={{ flex: 1, display: 'flex', justifyContent: 'center', gap: 8 }}>
          {tabs.map(t => (
            <button key={t.id} className={`nav-tab${activeTab === t.id ? ' active' : ''}`} onClick={() => onTabChange(t.id)}>{t.label}</button>
          ))}
        </div>
      </div>
    </nav>
  );
}

/* ── Tools Tab ── */
function ToolsTab({ tools, looms, onNavigateToAiId }) {
  const [searchInput, setSearchInput] = useState('');
  const [activeSearch, setActiveSearch] = useState('');
  const [activeCategory, setActiveCategory] = useState('All');
  const [loomExpanded, setLoomExpanded] = useState(true);

  const applySearch = term => { setSearchInput(term); setActiveSearch(term); };

  const filteredTools = tools.filter(tool => {
    const matchCat = activeCategory === 'All' || tool.category.toLowerCase() === activeCategory.toLowerCase();
    const q = activeSearch.toLowerCase();
    const matchSearch = !q || tool.name.toLowerCase().includes(q) || tool.description.toLowerCase().includes(q) || tool.tags.toLowerCase().includes(q) || tool.category.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  const filteredLooms = looms.filter(loom =>
    activeCategory === 'All' || loom.category.toLowerCase() === activeCategory.toLowerCase()
  );

  const noResults = filteredTools.length === 0;
  const hasSearch = activeSearch.trim() !== '';

  return (
    <div>
      {/* Hero */}
      <div style={{ background: '#fff', borderBottom: '1px solid rgba(0,0,0,0.06)', textAlign: 'center', padding: '56px 24px 36px' }}>
        <h1 style={{ fontSize: 34, fontWeight: 800, color: '#1a1a1a', marginBottom: 10, letterSpacing: '-0.02em' }}>Find the right AI tool ☀️</h1>
        <p style={{ color: '#888580', fontSize: 15, marginBottom: 28 }}>All your favourite AI tools and training — in one sunny place</p>
        <div className="search-bar-container" style={{ maxWidth: 560, margin: '0 auto 16px' }}>
          <input type="text" value={searchInput} onChange={e => setSearchInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && setActiveSearch(searchInput)} placeholder="Search tools, categories, tags…" className="form-input" style={{ flex: 1 }} />
          <button className="btn-gold" onClick={() => setActiveSearch(searchInput)}>Search</button>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 12, color: '#888580', fontWeight: 600 }}>Popular:</span>
          {POPULAR_SEARCHES.map(term => <button key={term} className="popular-pill" onClick={() => applySearch(term)}>{term}</button>)}
        </div>
      </div>

      {/* Category filter strip */}
      <div style={{ background: '#fff', borderBottom: '1px solid rgba(0,0,0,0.06)' }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '14px 24px', display: 'flex', gap: 8, overflowX: 'auto' }}>
          {TOOL_CATEGORIES.map(cat => (
            <button key={cat} className={`filter-pill${activeCategory === cat ? ' active' : ''}`} onClick={() => setActiveCategory(cat)}>{cat}</button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth: 1280, margin: '0 auto', padding: '32px 24px 60px' }}>
        {noResults && hasSearch ? (
          <div style={{ textAlign: 'center', padding: '60px 24px' }}>
            <div style={{ fontSize: 56, marginBottom: 18 }}>🔍</div>
            <h2 style={{ fontSize: 22, fontWeight: 700, color: '#1a1a1a', marginBottom: 10 }}>No tools found for "{activeSearch}"</h2>
            <p style={{ color: '#888580', fontSize: 15, marginBottom: 6 }}>Can't find what you're looking for?</p>
            <button className="btn-gold" style={{ marginTop: 20, padding: '11px 28px', fontSize: 14, borderRadius: 10 }} onClick={() => onNavigateToAiId(`I was looking for a tool that can ${activeSearch}`)}>
              Submit to the AI Champs →
            </button>
          </div>
        ) : noResults ? (
          <div style={{ textAlign: 'center', padding: '60px 24px', color: '#888580' }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>🔧</div>
            <p style={{ fontWeight: 600, fontSize: 15 }}>No tools yet in {activeCategory}</p>
            <p style={{ fontSize: 13, marginTop: 4 }}>Check back soon!</p>
          </div>
        ) : (
          <div className="tools-grid">
            {filteredTools.map((tool, i) => (
              <a key={i} href={tool.toolLink || '#'} target={tool.toolLink ? '_blank' : undefined} rel="noopener noreferrer" className="tool-card">
                <div style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 44, height: 44, background: '#f5f5f4', borderRadius: 10, fontSize: 22, marginBottom: 14 }}>
                  {tool.emoji || '🔧'}
                </div>
                <div style={{ fontWeight: 700, fontSize: 14, color: '#1a1a1a', marginBottom: 4, lineHeight: 1.3 }}>{tool.name}</div>
                <div style={{ fontSize: 11, color: '#E8A020', fontWeight: 600, marginBottom: 8, textTransform: 'uppercase', letterSpacing: '0.06em' }}>{tool.category}</div>
                <div className="line-clamp-2" style={{ fontSize: 12, color: '#888580', lineHeight: 1.55 }}>{tool.description}</div>
              </a>
            ))}
          </div>
        )}

        {/* Training Videos */}
        {filteredLooms.length > 0 && (
          <div style={{ marginTop: 52 }}>
            <div style={{ borderTop: '1px solid rgba(0,0,0,0.08)', marginBottom: 24 }} />
            <button className="collapse-btn" onClick={() => setLoomExpanded(v => !v)} style={{ marginBottom: loomExpanded ? 20 : 0 }}>
              <span style={{ fontSize: 11, opacity: 0.6 }}>{loomExpanded ? '▼' : '▶'}</span>
              📹 Training Videos{activeCategory !== 'All' && <span style={{ color: '#888580', fontWeight: 400 }}> — {activeCategory}</span>}
              <span style={{ fontSize: 12, fontWeight: 400, color: '#888580', marginLeft: 4 }}>({filteredLooms.length})</span>
            </button>
            {loomExpanded && (
              <div className="looms-grid">
                {filteredLooms.map((loom, i) => (
                  <a key={i} href={loom.loomLink || '#'} target={loom.loomLink ? '_blank' : undefined} rel="noopener noreferrer" className="loom-card">
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
                      <span style={{ background: 'rgba(232,160,32,0.12)', color: '#E8A020', fontSize: 11, fontWeight: 700, padding: '2px 8px', borderRadius: 100 }}>{loom.category}</span>
                      {loom.duration && <span style={{ fontSize: 11, color: '#888580' }}>⏱ {loom.duration}</span>}
                    </div>
                    <div className="line-clamp-2" style={{ fontWeight: 600, fontSize: 13, color: '#1a1a1a', lineHeight: 1.4, marginBottom: 6 }}>{loom.title}</div>
                    {loom.description && <div className="line-clamp-2" style={{ fontSize: 12, color: '#888580', lineHeight: 1.5 }}>{loom.description}</div>}
                  </a>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Skill Library Tab ── */
function SkillLibraryTab({ tips, skills }) {
  const [search, setSearch] = useState('');
  const [tipsTagFilter, setTipsTagFilter] = useState('All');
  const [skillsCatFilter, setSkillsCatFilter] = useState('All');
  const [expandedTips, setExpandedTips] = useState(new Set());
  const [liked, setLiked] = useState(new Set());
  const [likeCounts, setLikeCounts] = useState({});

  useEffect(() => { setLiked(readLiked()); }, []);

  useEffect(() => {
    setLikeCounts(prev => {
      const next = { ...prev };
      tips.forEach(t => { if (!(t.tip in next)) next[t.tip] = Number(t.likes) || 0; });
      return next;
    });
  }, [tips]);

  const handleLike = tip => {
    if (liked.has(tip.tip)) return;
    const next = new Set(liked); next.add(tip.tip); setLiked(next);
    try { sessionStorage.setItem('sunnyLiked', JSON.stringify([...next])); } catch {}
    setLikeCounts(prev => ({ ...prev, [tip.tip]: (prev[tip.tip] || 0) + 1 }));
    fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'like', tip: tip.tip }) }).catch(() => {});
  };

  const toggleExpand = title => setExpandedTips(prev => { const n = new Set(prev); n.has(title) ? n.delete(title) : n.add(title); return n; });

  const tipTags = ['All', ...Array.from(new Set(tips.map(t => t.tag).filter(Boolean))).sort()];
  const skillCats = ['All', ...Array.from(new Set(skills.map(s => s.category).filter(Boolean))).sort()];

  const q = search.toLowerCase();
  const filteredTips = tips.filter(t => {
    const ms = !q || t.tip.toLowerCase().includes(q) || t.content.toLowerCase().includes(q) || t.tag.toLowerCase().includes(q);
    return ms && (tipsTagFilter === 'All' || t.tag === tipsTagFilter);
  });
  const filteredSkills = skills.filter(s => {
    const ms = !q || s.skill.toLowerCase().includes(q) || s.category.toLowerCase().includes(q) || s.tag.toLowerCase().includes(q);
    return ms && (skillsCatFilter === 'All' || s.category === skillsCatFilter);
  });

  return (
    <div>
      {/* Header */}
      <div style={{ background: '#fff', borderBottom: '1px solid rgba(0,0,0,0.06)', padding: '36px 24px 28px' }}>
        <div style={{ maxWidth: 1280, margin: '0 auto' }}>
          <h1 style={{ fontSize: 28, fontWeight: 800, color: '#1a1a1a', marginBottom: 6, letterSpacing: '-0.02em' }}>Claude Skill Library</h1>
          <p style={{ color: '#888580', fontSize: 14, marginBottom: 20 }}>Prompts, guides and tips curated by the AI Champs</p>
          <div className="search-bar-container" style={{ maxWidth: 520 }}>
            <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Search tips, skills, tags…" className="form-input" style={{ flex: 1 }} />
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1280, margin: '0 auto', padding: '36px 24px 60px' }}>
        {/* Tips & Tricks */}
        <div style={{ marginBottom: 8 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12, marginBottom: 4 }}>
            <h2 style={{ fontSize: 17, fontWeight: 700, color: '#1a1a1a' }}>💡 Tips &amp; Tricks</h2>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {tipTags.map(tag => <button key={tag} className={`filter-pill${tipsTagFilter === tag ? ' active' : ''}`} onClick={() => setTipsTagFilter(tag)}>{tag}</button>)}
            </div>
          </div>

          {filteredTips.length === 0 ? (
            <div style={{ textAlign: 'center', padding: '40px 0', color: '#888580' }}>
              <div style={{ fontSize: 36, marginBottom: 10 }}>💬</div>
              <p style={{ fontWeight: 600, fontSize: 14 }}>No tips found</p>
              {search && <p style={{ fontSize: 13, marginTop: 4 }}>Try a different search term</p>}
            </div>
          ) : filteredTips.map((tip, i) => {
            const isExpanded = expandedTips.has(tip.tip);
            const isLiked = liked.has(tip.tip);
            const count = likeCounts[tip.tip] ?? Number(tip.likes) ?? 0;
            const TRUNC = 180;
            const needs = tip.content.length > TRUNC;
            const display = needs && !isExpanded ? tip.content.slice(0, TRUNC) + '…' : tip.content;
            return (
              <div key={i} className="tip-item">
                <button className={`upvote-btn${isLiked ? ' liked' : ''}`} onClick={() => handleLike(tip)} disabled={isLiked}>
                  <span style={{ fontSize: 14, lineHeight: 1 }}>▲</span>
                  <span style={{ fontSize: 12, fontWeight: 700 }}>{count}</span>
                </button>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 700, fontSize: 14, color: '#1a1a1a', marginBottom: 6, lineHeight: 1.4 }}>{tip.tip}</div>
                  <div style={{ fontSize: 13, color: '#888580', lineHeight: 1.6, marginBottom: 8 }}>
                    {display}
                    {needs && <button className="read-more-btn" onClick={() => toggleExpand(tip.tip)}> {isExpanded ? 'Show less' : 'Read more'}</button>}
                  </div>
                  <div style={{ fontSize: 12, color: '#888580', display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                    {tip.postedBy && <span>Shared by {tip.postedBy}</span>}
                    {tip.tag && <span style={{ padding: '2px 8px', border: '1px solid rgba(0,0,0,0.12)', borderRadius: 100, fontSize: 11 }}>{tip.tag}</span>}
                  </div>
                </div>
                <button className="bookmark-btn" title="Bookmark">🔖</button>
              </div>
            );
          })}
        </div>

        <div style={{ borderTop: '1px solid rgba(0,0,0,0.08)', margin: '36px 0' }} />

        {/* Skill Library */}
        <div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12, marginBottom: 20 }}>
            <h2 style={{ fontSize: 17, fontWeight: 700, color: '#1a1a1a' }}>📁 Skill Library</h2>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {skillCats.map(cat => <button key={cat} className={`filter-pill${skillsCatFilter === cat ? ' active' : ''}`} onClick={() => setSkillsCatFilter(cat)}>{cat}</button>)}
            </div>
          </div>

          {filteredSkills.length === 0 ? (
            <div style={{ textAlign: 'center', padding: '40px 0', color: '#888580' }}>
              <div style={{ fontSize: 36, marginBottom: 10 }}>📂</div>
              <p style={{ fontWeight: 600, fontSize: 14 }}>No skills found</p>
              {search && <p style={{ fontSize: 13, marginTop: 4 }}>Try a different search term</p>}
            </div>
          ) : (
            <div className="skills-grid">
              {filteredSkills.map((skill, i) => {
                const { type, bg } = getFileType(skill.fileLink);
                return (
                  <div key={i} className="skill-card">
                    <div style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', background: bg, color: '#fff', borderRadius: 7, padding: '4px 10px', fontSize: 11, fontWeight: 700, letterSpacing: '0.04em', marginBottom: 12, alignSelf: 'flex-start' }}>{type}</div>
                    <div style={{ fontWeight: 700, fontSize: 13, color: '#1a1a1a', marginBottom: 4, lineHeight: 1.4 }}>{skill.skill}</div>
                    <div style={{ fontSize: 12, color: '#888580', marginBottom: skill.tag ? 8 : 12 }}>{skill.category}</div>
                    {skill.tag && <div style={{ marginBottom: 14 }}><span style={{ display: 'inline-block', padding: '2px 8px', border: '1px solid rgba(0,0,0,0.12)', borderRadius: 100, fontSize: 11, color: '#888580' }}>{skill.tag}</span></div>}
                    {skill.fileLink && (
                      <div style={{ marginTop: 'auto' }}>
                        <a href={skill.fileLink} target="_blank" rel="noopener noreferrer" className="btn-gold" style={{ display: 'inline-block', padding: '6px 14px', fontSize: 12, borderRadius: 7, textDecoration: 'none' }}>
                          {type === 'MD' ? 'Open' : 'Download'}
                        </a>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Could This Be AI'd? Tab ── */
function AiIdTab({ prefilledProblem }) {
  const [name, setName] = useState('');
  const [problem, setProblem] = useState('');
  const [timeTaken, setTimeTaken] = useState('');
  const [othersInvolved, setOthersInvolved] = useState('');
  const [currentProcess, setCurrentProcess] = useState('');
  const [idealOutcome, setIdealOutcome] = useState('');
  const [website, setWebsite] = useState('');
  const [status, setStatus] = useState('idle');

  useEffect(() => { if (prefilledProblem) setProblem(prefilledProblem); }, [prefilledProblem]);

  const reset = () => { setName(''); setProblem(''); setTimeTaken(''); setOthersInvolved(''); setCurrentProcess(''); setIdealOutcome(''); setWebsite(''); };

  const handleSubmit = async e => {
    e.preventDefault(); setStatus('loading');
    try {
      await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, problem, timeTaken, othersInvolved, currentProcess, idealOutcome, website }) });
      setStatus('success'); reset();
    } catch { setStatus('error'); }
  };

  const Field = ({ label, children }) => (
    <div>
      <label style={{ display: 'block', fontWeight: 600, fontSize: 14, color: '#1a1a1a', marginBottom: 8 }}>{label}</label>
      {children}
    </div>
  );

  return (
    <div style={{ maxWidth: 720, margin: '0 auto', padding: '48px 24px 80px' }}>
      <h1 style={{ fontSize: 28, fontWeight: 800, color: '#1a1a1a', marginBottom: 10, letterSpacing: '-0.02em' }}>Could this be AI'd? 💡</h1>
      <p style={{ color: '#888580', fontSize: 14, lineHeight: 1.6, marginBottom: 24 }}>Think a task in your workflow could be automated or improved with AI? Tell the AI Champs and we'll look into it.</p>

      <div style={{ background: 'rgba(232,160,32,0.08)', border: '1px solid rgba(232,160,32,0.25)', borderRadius: 12, padding: '14px 18px', marginBottom: 36, fontSize: 14, color: '#1a1a1a', lineHeight: 1.5 }}>
        ✨ Already looked for a tool and couldn't find it? You're in the right place. Tell us what you need below.
      </div>

      {status === 'success' && <div style={{ background: 'rgba(56,161,105,0.1)', border: '1px solid rgba(56,161,105,0.35)', borderRadius: 10, padding: '14px 18px', marginBottom: 28, fontSize: 14, fontWeight: 600, color: '#276749' }}>Submitted! The AI Champs will review your task. ✅</div>}
      {status === 'error' && <div style={{ background: 'rgba(229,62,62,0.08)', border: '1px solid rgba(229,62,62,0.3)', borderRadius: 10, padding: '14px 18px', marginBottom: 28, fontSize: 14, fontWeight: 600, color: '#c53030' }}>Something went wrong — please try again.</div>}

      <form onSubmit={handleSubmit}>
        {/* Honeypot */}
        <div style={{ display: 'none' }} aria-hidden="true">
          <input type="text" name="website" value={website} onChange={e => setWebsite(e.target.value)} tabIndex={-1} autoComplete="off" />
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>
          <Field label="Your name"><input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Jane Smith" className="form-input" /></Field>
          <Field label="What problem are you wanting solved?"><textarea value={problem} onChange={e => setProblem(e.target.value)} placeholder="Describe the task or problem you'd like AI to help with…" className="form-textarea" style={{ minHeight: 110 }} /></Field>
          <Field label="How often and how long does this take?"><input type="text" value={timeTaken} onChange={e => setTimeTaken(e.target.value)} placeholder="e.g. Daily, takes about 30 minutes each time" className="form-input" /></Field>
          <Field label="Who else in the office does this task?"><input type="text" value={othersInvolved} onChange={e => setOthersInvolved(e.target.value)} placeholder="e.g. The whole account management team" className="form-input" /></Field>
          <Field label="What is the current process?"><textarea value={currentProcess} onChange={e => setCurrentProcess(e.target.value)} placeholder="Walk us through the steps you currently follow…" className="form-textarea" /></Field>
          <Field label="What is the ideal end outcome?"><textarea value={idealOutcome} onChange={e => setIdealOutcome(e.target.value)} placeholder="Describe what success looks like — what would you get back?" className="form-textarea" /></Field>
          <div style={{ marginTop: 4 }}>
            <button type="submit" className="btn-gold submit-btn" disabled={status === 'loading'} style={{ padding: '13px 32px', fontSize: 15, borderRadius: 10, opacity: status === 'loading' ? 0.65 : 1 }}>
              {status === 'loading' ? 'Submitting…' : 'Submit to the AI Champs 🚀'}
            </button>
          </div>
        </div>
      </form>
    </div>
  );
}

/* ── Error State ── */
function ErrorState({ onRetry }) {
  return (
    <div style={{ textAlign: 'center', padding: '100px 24px' }}>
      <div style={{ fontSize: 52, marginBottom: 18 }}>😕</div>
      <p style={{ fontSize: 17, fontWeight: 700, color: '#1a1a1a', marginBottom: 8 }}>Couldn't load the hub data</p>
      <p style={{ color: '#888580', fontSize: 14, marginBottom: 28, maxWidth: 320, margin: '0 auto 28px' }}>Check your internet connection and try again.</p>
      <button className="btn-gold" onClick={onRetry} style={{ padding: '11px 28px', fontSize: 14, borderRadius: 10 }}>Retry</button>
    </div>
  );
}

/* ── App (root) ── */
function App() {
  const [authChecked, setAuthChecked] = useState(false);
  const [isAuthed, setIsAuthed] = useState(false);
  const [activeTab, setActiveTab] = useState('tools');
  const [prefilledProblem, setPrefilledProblem] = useState('');

  const [tools, setTools] = useState([]);
  const [looms, setLooms] = useState([]);
  const [skills, setSkills] = useState([]);
  const [tips, setTips] = useState([]);
  const [loading, setLoading] = useState(false);
  const [fetchError, setFetchError] = useState(false);

  useEffect(() => { setIsAuthed(checkAuth()); setAuthChecked(true); }, []);

  const fetchData = useCallback(async () => {
    setLoading(true); setFetchError(false);
    try {
      const [toolsRes, loomsRes, skillsRes, tipsRes] = await Promise.all([
        fetch(`${APPS_SCRIPT_URL}?action=tools`),
        fetch(`${APPS_SCRIPT_URL}?action=looms`),
        fetch(`${APPS_SCRIPT_URL}?action=skills`),
        fetch(`${APPS_SCRIPT_URL}?action=tips`),
      ]);
      const [td, ld, sd, tipd] = await Promise.all([toolsRes.json(), loomsRes.json(), skillsRes.json(), tipsRes.json()]);

      if (td.status === 'success') setTools(parseRows(td.data).map(r => ({ name: pick(r,'tool_name','name'), category: pick(r,'category'), description: pick(r,'description'), emoji: pick(r,'emoji')||'🔧', toolLink: pick(r,'tool_link','link','url'), tags: pick(r,'tags','tag'), status: pick(r,'status') })));
      if (ld.status === 'success') setLooms(parseRows(ld.data).map(r => ({ title: pick(r,'title'), category: pick(r,'category'), description: pick(r,'description'), loomLink: pick(r,'loom_link','link','url'), duration: pick(r,'duration') })));
      if (sd.status === 'success') setSkills(parseRows(sd.data).map(r => ({ skill: pick(r,'skill'), fileLink: pick(r,'file_link','link','url'), category: pick(r,'category'), tag: pick(r,'tag','tags') })));
      if (tipd.status === 'success') setTips(parseRows(tipd.data).map(r => ({ tip: pick(r,'tip'), content: pick(r,'content'), postedBy: pick(r,'posted_by','postedby','author'), tag: pick(r,'tag','tags'), likes: parseInt(pick(r,'likes')||'0',10)||0 })));
    } catch { setFetchError(true); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { if (isAuthed) fetchData(); }, [isAuthed, fetchData]);

  const handleNavigateToAiId = prefilled => { setPrefilledProblem(prefilled); setActiveTab('aiid'); };

  if (!authChecked) return null;
  if (!isAuthed) return <PasswordGate onAuthenticated={() => setIsAuthed(true)} />;

  return (
    <div style={{ minHeight: '100vh', background: '#f9f8f6' }}>
      <NavBar activeTab={activeTab} onTabChange={setActiveTab} />
      <main>
        {loading ? <Spinner /> : fetchError ? <ErrorState onRetry={fetchData} /> : (
          <>
            <div style={{ display: activeTab === 'tools' ? 'block' : 'none' }}>
              <ToolsTab tools={tools} looms={looms} onNavigateToAiId={handleNavigateToAiId} />
            </div>
            <div style={{ display: activeTab === 'skills' ? 'block' : 'none' }}>
              <SkillLibraryTab tips={tips} skills={skills} />
            </div>
            <div style={{ display: activeTab === 'aiid' ? 'block' : 'none' }}>
              <AiIdTab prefilledProblem={prefilledProblem} />
            </div>
          </>
        )}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
